name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config zlib1g-dev libncurses-dev libtinfo6 \
            cmake libffi-dev libssl-dev automake autopoint gettext libltdl-dev

      - name: Install Buildozer & dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Устанавливаем конкретные версии для большей предсказуемости
          pip install buildozer==1.5.0 cython==0.29.36

      - name: Clean previous builds (optional)
        run: |
          rm -rf .buildozer bin/
          echo "✓ Cleaned"

      - name: Build APK with Buildozer
        run: |
          buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Python-Learning-IDE-APK
          path: bin/*.apk
          if-no-files-found: error  # Лучше дать ошибку, если APK не найден